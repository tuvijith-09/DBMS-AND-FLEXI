<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Customers</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <i class="fas fa-chart-line"></i> IMS
    </div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="product.html"><i class="fas fa-box"></i> Products</a>
      <a href="supplier.html"><i class="fas fa-truck"></i> Suppliers</a>
      <a href="invoice.html"><i class="fas fa-file-invoice"></i> Invoices</a>
      <a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </header>
  <main class="container">
    <h1><i class="fas fa-users"></i> Customers</h1>
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> Add / Update Customer</h2>
      <form id="customerForm">
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Name</label>
            <input type="text" id="custName" required placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone"></i> Phone</label>
            <input type="tel" id="custPhone" placeholder="9876543210" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="custEmail" placeholder="john@example.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Address</label>
            <input type="text" id="custAddress" placeholder="Street, City" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-id-card"></i> GSTIN</label>
            <input type="text" id="custGstin" placeholder="27AAAPL1234C1ZV" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-credit-card"></i> Credit Limit</label>
            <input type="number" id="custCredit" min="0" step="0.01" placeholder="0.00" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Customer</button>
      </form>
    </div>
    <div class="card">
      <h2><i class="fas fa-list"></i> Customer List</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Balance</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Raju Kumar</td>
              <td>9876543210</td>
              <td>raju@mail.com</td>
              <td>₹ 5,800</td>
              <td>
                <button class="btn btn-outline"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger"><i class="fas fa-trash"></i> Delete</button>
              </td>
            </tr>
            <tr>
              <td>2</td>
              <td>Neha Sharma</td>
              <td>9876501234</td>
              <td>neha@mail.com</td>
              <td>₹ 12,740</td>
              <td>
                <button class="btn btn-outline"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger"><i class="fas fa-trash"></i> Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const themeIcon = themeToggle.querySelector('i');

    // Check for saved theme preference or default to light mode
    const currentTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';

      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
  </script>
</body>
</html>
