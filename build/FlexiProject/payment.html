<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Payments</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <script src="api.js"></script>
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <i class="fas fa-chart-line"></i> IMS
    </div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="customer.html"><i class="fas fa-users"></i> Customers</a>
      <a href="product.html"><i class="fas fa-box"></i> Products</a>
      <a href="supplier.html"><i class="fas fa-truck"></i> Suppliers</a>
      <a href="invoice.html"><i class="fas fa-file-invoice"></i> Invoices</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </header>
  <main class="container">
    <h1><i class="fas fa-credit-card"></i> Payments</h1>
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> Record Payment</h2>
      <form id="paymentForm">
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-file-invoice"></i> Invoice</label>
            <input type="text" id="payInvoice" placeholder="INV-1001" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-user"></i> Customer</label>
            <input type="text" id="payCustomer" placeholder="Customer Name" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-calendar"></i> Payment Date</label>
            <input type="date" id="paymentDate" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-rupee-sign"></i> Amount</label>
            <input type="number" id="paymentAmount" min="0" step="0.01" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-money-check"></i> Method</label>
            <select id="paymentMode">
              <option value="Cash">Cash</option>
              <option value="Card">Card</option>
              <option value="UPI">UPI</option>
              <option value="Bank Transfer">Bank Transfer</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-sticky-note"></i> Notes</label>
            <input type="text" id="paymentNotes" placeholder="Optional notes" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Payment</button>
      </form>
    </div>
    <div class="card">
      <h2><i class="fas fa-history"></i> Payment History</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Payment ID</th>
              <th>Invoice</th>
              <th>Amount</th>
              <th>Mode</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="paymentTableBody">
            <tr><td colspan="5">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script>
    // Initialize on page load
    (async () => {
      const shopId = await checkAuth();
      loadPayments();
      setupFormHandler();
      setupThemeToggle();
    })();

    // Load payments from backend
    async function loadPayments() {
      try {
        const payments = await API.payment.getAll();
        const tbody = document.getElementById('paymentTableBody');
        tbody.innerHTML = '';

        if (Array.isArray(payments) && payments.length > 0) {
          payments.forEach(p => {
            const row = tbody.insertRow();
            row.innerHTML = `
              <td>${p.paymentId}</td>
              <td>${p.invoiceId}</td>
              <td>₹ ${p.amount.toFixed(2)}</td>
              <td>${p.mode}</td>
              <td>
                <button class="btn btn-danger" onclick="deletePayment(${p.paymentId})">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </td>
            `;
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="5">No payments recorded</td></tr>';
        }
      } catch (error) {
        console.error('Error loading payments:', error);
        document.getElementById('paymentTableBody').innerHTML = 
          '<tr><td colspan="5">Error loading payments</td></tr>';
      }
    }

    // Handle form submission
    function setupFormHandler() {
      document.getElementById('paymentForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const invoiceId = document.getElementById('payInvoice').value;
        const amount = document.getElementById('paymentAmount').value;
        const paymentMode = document.getElementById('paymentMode').value;

        if (!invoiceId || !amount) {
          showNotification('Invoice ID and Amount are required', 'error');
          return;
        }

        try {
          const result = await API.payment.add({
            invoiceId: invoiceId,
            amount: amount,
            paymentMode: paymentMode
          });

          if (result.success) {
            showNotification('Payment added successfully', 'success');
            document.getElementById('paymentForm').reset();
            loadPayments();
          } else {
            showNotification('Error: ' + result.message, 'error');
          }
        } catch (error) {
          showNotification('Error adding payment: ' + error.message, 'error');
        }
      });
    }

    // Delete payment
    async function deletePayment(paymentId) {
      if (confirm('Are you sure you want to delete this payment?')) {
        try {
          const result = await API.payment.delete(paymentId);
          if (result.success) {
            showNotification('Payment deleted successfully', 'success');
            loadPayments();
          } else {
            showNotification('Error: ' + result.message, 'error');
          }
        } catch (error) {
          showNotification('Error deleting payment: ' + error.message, 'error');
        }
      }
    }

    // Theme toggle
    function setupThemeToggle() {
      const themeToggle = document.getElementById('theme-toggle');
      const body = document.body;
      const themeIcon = themeToggle.querySelector('i');

      const currentTheme = localStorage.getItem('theme') || 'light';
      body.setAttribute('data-theme', currentTheme);
      updateThemeIcon(currentTheme);

      themeToggle.addEventListener('click', () => {
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
      });
    }

    function updateThemeIcon(theme) {
      document.getElementById('theme-toggle').querySelector('i').className = 
        theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
  </script>
</body>
</html>
