<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Customers</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <i class="fas fa-chart-line"></i> IMS
    </div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="product.html"><i class="fas fa-box"></i> Products</a>
      <a href="supplier.html"><i class="fas fa-truck"></i> Suppliers</a>
      <a href="invoice.html"><i class="fas fa-file-invoice"></i> Invoices</a>
      <a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </header>
  <main class="container">
    <h1><i class="fas fa-users"></i> Customers</h1>
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> Add / Update Customer</h2>
      <form id="customerForm">
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Name</label>
            <input type="text" id="custName" required placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone"></i> Phone</label>
            <input type="tel" id="custPhone" placeholder="9876543210" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="custEmail" placeholder="john@example.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Address</label>
            <input type="text" id="custAddress" placeholder="Street, City" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-id-card"></i> GSTIN</label>
            <input type="text" id="custGstin" placeholder="27AAAPL1234C1ZV" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-credit-card"></i> Credit Limit</label>
            <input type="number" id="custCredit" min="0" step="0.01" placeholder="0.00" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Customer</button>
      </form>
    </div>
    <div class="card">
      <h2><i class="fas fa-list"></i> Customer List</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Balance</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="api.js"></script>
  <script>
    const customerForm = document.getElementById('customerForm');
    const customerTableBody = document.querySelector('tbody');
    let editMode = false;
    let editingCustomerId = null;

    // Load customers on startup
    async function loadCustomers() {
      try {
        const customers = await API.get('customer');
        customerTableBody.innerHTML = '';
        customers.forEach(c => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${c.customerId}</td>
            <td>${c.firstName} ${c.lastName}</td>
            <td>${c.phone}</td>
            <td>${c.email}</td>
            <td>${c.status}</td>
            <td>
              <button class="btn btn-outline" onclick="editCustomer(${JSON.stringify(c).replace(/"/g, '&quot;')})"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-danger" onclick="deleteCustomer(${c.customerId})"><i class="fas fa-trash"></i> Delete</button>
            </td>
          `;
          customerTableBody.appendChild(row);
        });
      } catch (error) {
        console.error('Failed to load customers:', error);
        showNotification('Failed to load customers', 'error');
      }
    }

    // Handle Form Submission
    customerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nameVal = document.getElementById('custName').value.trim();
      if (!nameVal) {
        showNotification('Customer name is required', 'error');
        return;
      }

      const fullName = nameVal.split(' ');
      const data = {
        firstName: fullName[0],
        lastName: fullName.length > 1 ? fullName.slice(1).join(' ') : '',
        phone: document.getElementById('custPhone').value,
        email: document.getElementById('custEmail').value,
        city: document.getElementById('custAddress').value,
        status: 'Active'
      };

      if (editMode) {
        data.id = editingCustomerId;
      }

      try {
        const result = await API.post('customer', data);
        if (result.success) {
          showNotification(result.message, 'success');
          customerForm.reset();
          editMode = false;
          editingCustomerId = null;
          document.querySelector('button[type="submit"]').innerHTML = '<i class="fas fa-save"></i> Save Customer';
          loadCustomers();
        } else {
          showNotification(result.message, 'error');
        }
      } catch (error) {
        showNotification('Operation failed: ' + error.message, 'error');
      }
    });

    window.editCustomer = (c) => {
      editMode = true;
      editingCustomerId = c.customerId;
      document.getElementById('custName').value = `${c.firstName} ${c.lastName}`.trim();
      document.getElementById('custPhone').value = c.phone;
      document.getElementById('custEmail').value = c.email;
      document.getElementById('custAddress').value = c.city;
      window.scrollTo(0, 0);
    };

    window.deleteCustomer = async (id) => {
      if (!confirm('Are you sure you want to delete this customer?')) return;
      try {
        const result = await API.delete('customer', id);
        if (result.success) {
          showNotification(result.message, 'success');
          loadCustomers();
        }
      } catch (error) {
        showNotification('Delete failed', 'error');
      }
    };

    // Initial load
    loadCustomers();

    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const themeIcon = themeToggle.querySelector('i');

    const currentTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
  </script>
</body>
</html>
