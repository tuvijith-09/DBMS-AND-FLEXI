<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Products</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <i class="fas fa-chart-line"></i> IMS
    </div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="customer.html"><i class="fas fa-users"></i> Customers</a>
      <a href="supplier.html"><i class="fas fa-truck"></i> Suppliers</a>
      <a href="invoice.html"><i class="fas fa-file-invoice"></i> Invoices</a>
      <a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </header>
  <main class="container">
    <h1><i class="fas fa-box"></i> Products</h1>
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> Add / Update Product</h2>
      <form id="productForm">
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-hashtag"></i> SKU</label>
            <input type="text" id="sku" placeholder="PRD001" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-tag"></i> Name</label>
            <input type="text" id="productName" placeholder="Product Name" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-layer-group"></i> Category</label>
            <input type="text" id="productCategory" placeholder="Category" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-arrow-down"></i> Purchase Price</label>
            <input type="number" id="purchasePrice" min="0" step="0.01" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-arrow-up"></i> Sale Price</label>
            <input type="number" id="salePrice" min="0" step="0.01" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-cubes"></i> Stock Qty</label>
            <input type="number" id="stockQty" min="0" step="1" placeholder="0" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Product</button>
      </form>
    </div>
    <div class="card">
      <h2><i class="fas fa-list"></i> Product List</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>SKU</th>
              <th>Name</th>
              <th>Category</th>
              <th>Purchase</th>
              <th>Sale</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="api.js"></script>
  <script>
    const productForm = document.getElementById('productForm');
    const productTableBody = document.querySelector('tbody');
    let editMode = false;
    let editingProductId = null;

    // Load products on startup
    async function loadProducts() {
      try {
        const products = await API.get('product');
        productTableBody.innerHTML = '';
        products.forEach(p => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${p.productId}</td>
            <td>PRD${p.productId.toString().padStart(3, '0')}</td>
            <td>${p.name}</td>
            <td>Category ${p.categoryId}</td>
            <td>₹ ${p.costPrice}</td>
            <td>₹ ${p.sellingPrice}</td>
            <td>${p.quantity}</td>
            <td>
              <button class="btn btn-outline" onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-danger" onclick="deleteProduct(${p.productId})"><i class="fas fa-trash"></i> Delete</button>
            </td>
          `;
          productTableBody.appendChild(row);
        });
      } catch (error) {
        console.error('Failed to load products:', error);
        showNotification('Failed to load products', 'error');
      }
    }

    // Handle Form Submission
    productForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('productName').value.trim();
      if (!name) {
        showNotification('Product name is required', 'error');
        return;
      }

      const data = {
        name: name,
        categoryId: 1, // Defaulting to 1 for now
        costPrice: document.getElementById('purchasePrice').value || 0,
        sellingPrice: document.getElementById('salePrice').value || 0,
        quantity: document.getElementById('stockQty').value || 0
      };

      if (editMode) {
        data.id = editingProductId;
      }

      try {
        const result = await API.post('product', data);
        if (result.success) {
          showNotification(result.message, 'success');
          productForm.reset();
          editMode = false;
          editingProductId = null;
          document.querySelector('button[type="submit"]').innerHTML = '<i class="fas fa-save"></i> Save Product';
          loadProducts();
        } else {
          showNotification(result.message, 'error');
        }
      } catch (error) {
        showNotification('Operation failed: ' + error.message, 'error');
      }
    });

    window.editProduct = (p) => {
      editMode = true;
      editingProductId = p.productId;
      document.getElementById('productName').value = p.name;
      document.getElementById('purchasePrice').value = p.costPrice;
      document.getElementById('salePrice').value = p.sellingPrice;
      document.getElementById('stockQty').value = p.quantity;
      window.scrollTo(0, 0);
    };

    window.deleteProduct = async (id) => {
      if (!confirm('Are you sure you want to delete this product?')) return;
      try {
        const result = await API.delete('product', id);
        if (result.success) {
          showNotification(result.message, 'success');
          loadProducts();
        }
      } catch (error) {
        showNotification('Delete failed', 'error');
      }
    };

    // Initial load
    loadProducts();

    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const themeIcon = themeToggle.querySelector('i');

    const currentTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
  </script>
</body>
</html>
