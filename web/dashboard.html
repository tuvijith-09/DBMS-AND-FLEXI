<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <i class="fas fa-chart-line"></i> IMS
    </div>
    <nav>
      <a href="customer.html"><i class="fas fa-users"></i> Customers</a>
      <a href="product.html"><i class="fas fa-box"></i> Products</a>
      <a href="supplier.html"><i class="fas fa-truck"></i> Suppliers</a>
      <a href="invoice.html"><i class="fas fa-file-invoice"></i> Invoices</a>
      <a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </header>
  <main class="container">
    <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
    <p class="text-muted">Real-time overview of your business metrics and operations.</p>
    <div class="grid-3">
      <div class="card dashboard-card">
        <i class="fas fa-users" style="font-size: 2rem; color: var(--accent); margin-bottom: 0.5rem;"></i>
        <h3>Total Customers</h3>
        <p>108</p>
      </div>
      <div class="card dashboard-card">
        <i class="fas fa-boxes" style="font-size: 2rem; color: var(--success); margin-bottom: 0.5rem;"></i>
        <h3>Total Products</h3>
        <p>205</p>
      </div>
      <div class="card dashboard-card">
        <i class="fas fa-truck" style="font-size: 2rem; color: var(--warning); margin-bottom: 0.5rem;"></i>
        <h3>Total Suppliers</h3>
        <p>42</p>
      </div>
      <div class="card dashboard-card">
        <i class="fas fa-file-invoice-dollar" style="font-size: 2rem; color: var(--danger); margin-bottom: 0.5rem;"></i>
        <h3>Pending Invoices</h3>
        <p>16</p>
      </div>
      <div class="card dashboard-card">
        <i class="fas fa-rupee-sign" style="font-size: 2rem; color: var(--success); margin-bottom: 0.5rem;"></i>
        <h3>Payments Received</h3>
        <p>₹ 341,750</p>
      </div>
      <div class="card dashboard-card">
        <i class="fas fa-chart-pie" style="font-size: 2rem; color: var(--secondary); margin-bottom: 0.5rem;"></i>
        <h3>Expenses</h3>
        <p>₹ 96,420</p>
      </div>
    </div>
  </main>
  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const themeIcon = themeToggle.querySelector('i');

    // Check for saved theme preference or default to light mode
    const currentTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';

      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
  </script>
</body>
</html>
