<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Signup / Login</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <script src="api.js"></script>
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);">

  <button class="theme-toggle" id="theme-toggle" style="position: absolute; top: 1rem; right: 1rem;">
    <i class="fas fa-moon"></i>
  </button>

  <div class="card" style="max-width:450px;width:100%;box-shadow: var(--shadow-lg);">

    <div class="text-center mb-0">
      <i class="fas fa-building" style="font-size: 3rem; color: var(--accent); margin-bottom: 1rem;"></i>
    </div>

    <h1 class="text-center">IMS</h1>
    <p class="text-muted text-center">Sign up to get started or login if you already have an account</p>

    <!-- Tabs -->
    <div style="display:flex;margin-bottom:1rem;">
      <button id="loginTab" class="btn btn-primary" style="flex:1;margin-right:0.5rem;">Login</button>
      <button id="signupTab" class="btn btn-secondary" style="flex:1;">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" style="display:none;">
      <div class="form-group">
        <label><i class="fas fa-store"></i> SHOP ID</label>
        <input type="number" id="loginShopId" placeholder="Enter Shop ID" required />
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> USERNAME OR EMAIL</label>
        <input type="text" id="loginEmail" placeholder="Enter username or email" required />
      </div>

      <!-- FIX: Added password field (was missing from original) -->
      <div class="form-group">
        <label><i class="fas fa-lock"></i> PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required />
      </div>

      <p class="text-muted text-center" style="font-size:0.85rem;">Already signed up? Click Login</p>
      <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" required />
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-group">
        <label><i class="fas fa-phone"></i> PHONE</label>
        <input type="text" id="phone" required />
      </div>

      <div class="form-group">
        <label><i class="fas fa-city"></i> CITY</label>
        <input type="text" id="city" required />
      </div>

      <div class="form-group">
        <label><i class="fas fa-store"></i> SHOP ID</label>
        <input type="number" id="signupShopId" required />
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> USERNAME</label>
        <input type="text" id="signupUsername" required />
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> PASSWORD</label>
        <input type="password" id="signupPassword" required />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-user-plus"></i> Sign Up</button>
    </form>

  </div>

<script>
  // Tabs
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  // Show login by default
  loginForm.style.display = 'block';
  signupForm.style.display = 'none';

  loginTab.onclick = () => {
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    loginTab.className = 'btn btn-primary';
    signupTab.className = 'btn btn-secondary';
  };

  signupTab.onclick = () => {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    signupTab.className = 'btn btn-primary';
    loginTab.className = 'btn btn-secondary';
  };

  // LOGIN HANDLER
  // FIX: Was calling '/FlexiProject/LoginServlet' — wrong old URL!
  // Now uses API.login() which calls the correct '/api/login' endpoint via api.js
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const shopId = document.getElementById('loginShopId').value;
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
      // FIX: Use API helper (resolves to correct /FlexiProject/api/login)
      const result = await API.post('login', {
        email: email,
        shopId: shopId,
        password: password
      });

      if (result.success) {
        sessionStorage.setItem('shopId', shopId);
        window.location.href = 'dashboard.html';
      } else {
        alert('Login failed: ' + result.message);
      }

    } catch (err) {
      alert('Error: ' + err.message);
    }
  });

  // SIGNUP HANDLER
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const city = document.getElementById('city').value;
    const shopId = document.getElementById('signupShopId').value;
    const username = document.getElementById('signupUsername').value;
    const password = document.getElementById('signupPassword').value;

    try {
      const result = await API.signup({
        firstName, lastName, email, phone, city, shopId, username, password
      });

      if (result.success) {
        alert('Signup successful! Please login.');
        loginTab.click();
      } else {
        alert('Signup failed: ' + result.message);
      }

    } catch (err) {
      alert('Error: ' + err.message);
    }
  });

</script>

</body>
</html>
