<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS | Suppliers</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <i class="fas fa-chart-line"></i> IMS
    </div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="customer.html"><i class="fas fa-users"></i> Customers</a>
      <a href="product.html"><i class="fas fa-box"></i> Products</a>
      <a href="invoice.html"><i class="fas fa-file-invoice"></i> Invoices</a>
      <a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </header>
  <main class="container">
    <h1><i class="fas fa-truck"></i> Suppliers</h1>
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> Add / Update Supplier</h2>
      <form id="supplierForm">
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-building"></i> Company</label>
            <input type="text" id="supplierCompany" placeholder="Supplier Pvt Ltd" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-user-tie"></i> Contact</label>
            <input type="text" id="supplierContact" placeholder="Arjun" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="supplierEmail" placeholder="supplier@mail.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-phone"></i> Phone</label>
            <input type="tel" id="supplierPhone" placeholder="9876543210" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-city"></i> City</label>
            <input type="text" id="supplierCity" placeholder="Chennai" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-tags"></i> Product Categories</label>
            <input type="text" id="supplierCategories" placeholder="Stationery, Office" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Supplier</button>
      </form>
    </div>
    <div class="card">
      <h2><i class="fas fa-list"></i> Supplier List</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Company</th>
              <th>Contact</th>
              <th>Email</th>
              <th>Phone</th>
              <th>City</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="api.js"></script>
  <script>
    const supplierForm = document.getElementById('supplierForm');
    const supplierTableBody = document.querySelector('tbody');
    let editMode = false;
    let editingSupplierId = null;

    // Load suppliers on startup
    async function loadSuppliers() {
      try {
        const suppliers = await API.get('supplier');
        supplierTableBody.innerHTML = '';
        suppliers.forEach(s => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${s.supplierId}</td>
            <td>${s.companyName}</td>
            <td>${s.firstName} ${s.lastName}</td>
            <td>${s.email}</td>
            <td>${s.phone}</td>
            <td>${s.city}</td>
            <td>-</td>
            <td>
              <button class="btn btn-outline" onclick="editSupplier(${JSON.stringify(s).replace(/"/g, '&quot;')})"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-danger" onclick="deleteSupplier(${s.supplierId})"><i class="fas fa-trash"></i> Delete</button>
            </td>
          `;
          supplierTableBody.appendChild(row);
        });
      } catch (error) {
        console.error('Failed to load suppliers:', error);
        showNotification('Failed to load suppliers', 'error');
      }
    }

    // Handle Form Submission
    supplierForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const companyName = document.getElementById('supplierCompany').value.trim();
      const contactNameVal = document.getElementById('supplierContact').value.trim();
      
      if (!companyName || !contactNameVal) {
        showNotification('Company name and contact name are required', 'error');
        return;
      }

      const contactName = contactNameVal.split(' ');
      const data = {
        companyName: companyName,
        firstName: contactName[0],
        lastName: contactName.length > 1 ? contactName.slice(1).join(' ') : '',
        email: document.getElementById('supplierEmail').value,
        phone: document.getElementById('supplierPhone').value,
        city: document.getElementById('supplierCity').value,
      };

      if (editMode) {
        data.id = editingSupplierId;
      }

      try {
        const result = await API.post('supplier', data);
        if (result.success) {
          showNotification(result.message, 'success');
          supplierForm.reset();
          editMode = false;
          editingSupplierId = null;
          document.querySelector('button[type="submit"]').innerHTML = '<i class="fas fa-save"></i> Save Supplier';
          loadSuppliers();
        } else {
          showNotification(result.message, 'error');
        }
      } catch (error) {
        showNotification('Operation failed: ' + error.message, 'error');
      }
    });

    window.editSupplier = (s) => {
      editMode = true;
      editingSupplierId = s.supplierId;
      document.getElementById('supplierCompany').value = s.companyName;
      document.getElementById('supplierContact').value = `${s.firstName} ${s.lastName}`.trim();
      document.getElementById('supplierEmail').value = s.email;
      document.getElementById('supplierPhone').value = s.phone;
      document.getElementById('supplierCity').value = s.city;
      window.scrollTo(0, 0);
    };

    window.deleteSupplier = async (id) => {
      if (!confirm('Are you sure you want to delete this supplier?')) return;
      try {
        const result = await API.delete('supplier', id);
        if (result.success) {
          showNotification(result.message, 'success');
          loadSuppliers();
        }
      } catch (error) {
        showNotification('Delete failed', 'error');
      }
    };

    // Initial load
    loadSuppliers();

    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const themeIcon = themeToggle.querySelector('i');

    const currentTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
    }
  </script>
</body>
</html>
